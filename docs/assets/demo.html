<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --term-bg:#1b1d23; --term-head:#2a2d35; --green:#06c755;
    --line-bg:#8aa6c8; --bubble:#ffffff; --txt:#e7e9ee;
  }
  html,body{ background:#0d0e12; }
  .stage{
    width:1000px; height:520px; display:flex; gap:0;
    font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:radial-gradient(1200px 600px at 30% -10%, #20242e 0%, #0d0e12 60%);
    align-items:center; justify-content:center; padding:34px;
  }

  /* ---- 左: ターミナル ---- */
  .term{
    width:560px; height:452px; background:var(--term-bg); border-radius:12px;
    box-shadow:0 24px 60px rgba(0,0,0,.55); overflow:hidden; color:var(--txt);
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace; font-size:15px;
  }
  .term .bar{ height:38px; background:var(--term-head); display:flex; align-items:center; padding:0 14px; gap:8px; }
  .dot{ width:12px;height:12px;border-radius:50%; }
  .r{background:#ff5f57}.y{background:#febc2e}.g{background:#28c840}
  .term .title{ margin-left:12px; color:#9aa0ac; font-size:13px; }
  .term .body{ padding:18px 20px; line-height:1.75; }
  .ln{ opacity:0; }
  .muted{ color:#9aa0ac; } .ok{ color:#3ddc84; } .acc{ color:#7aa2f7; } .yel{color:#e0af68;}
  .user{ color:#fff; } .dotmark{ color:var(--green); }
  .caret{ display:inline-block; width:9px; height:18px; background:#cdd3df; vertical-align:-3px; margin-left:2px; animation:blink 1s steps(1) infinite; }

  /* ---- 右: スマホ LINE 風 ---- */
  .phone{
    width:300px; height:452px; margin-left:34px; background:var(--line-bg);
    border-radius:30px; box-shadow:0 24px 60px rgba(0,0,0,.55); overflow:hidden;
    border:7px solid #14161b; position:relative;
  }
  .ph-head{ height:54px; background:var(--green); color:#fff; display:flex; align-items:center; padding:0 16px; gap:10px; font-weight:600; }
  .ph-head .ava{ width:30px;height:30px;border-radius:50%; background:#fff3; display:flex;align-items:center;justify-content:center;font-size:16px; }
  .ph-head small{ font-weight:400; opacity:.85; display:block; font-size:11px; }
  .chat{ padding:16px 12px; }
  .row{ display:flex; align-items:flex-end; gap:6px; }
  .ava-s{ width:26px;height:26px;border-radius:50%;background:#fff;flex:none; display:flex;align-items:center;justify-content:center;font-size:13px; }
  .bubble{
    background:var(--bubble); border-radius:4px 16px 16px 16px; padding:8px;
    max-width:200px; box-shadow:0 2px 4px rgba(0,0,0,.12);
    opacity:0; transform:translateY(14px) scale(.95);
  }
  .bubble .cap{ font-size:13px; color:#222; padding:4px 4px 2px; }
  .time{ font-size:10px; color:#ffffffcc; align-self:flex-end; margin-bottom:2px; opacity:0; }
  svg.graph{ display:block; border-radius:8px; }

  /* ---- アニメーション(6s ループ・同期) ---- */
  @keyframes blink{ 0%,50%{opacity:1}51%,100%{opacity:0} }
  @keyframes fade{ to{opacity:1} }
  @keyframes pop{ to{opacity:1; transform:none} }
  .l1{ animation:fade .01s linear forwards;            animation-delay:.2s; }
  .l2{ animation:fade .01s linear forwards;            animation-delay:1.3s; }
  .l3{ animation:fade .01s linear forwards;            animation-delay:2.0s; }
  .l4{ animation:fade .01s linear forwards;            animation-delay:2.6s; }
  .l5{ animation:fade .01s linear forwards;            animation-delay:3.2s; }
  .bubble{ animation:pop .5s cubic-bezier(.2,.7,.3,1.2) forwards; animation-delay:3.5s; }
  .time{ animation:fade .3s forwards; animation-delay:3.9s; }
</style>
</head>
<body>
  <div class="stage">
    <div class="term">
      <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="title">claude — sLINE</span></div>
      <div class="body">
        <div class="ln l1"><span class="dotmark">●</span> <span class="user">このROC曲線、スマホのLINEに送っておいて</span></div>
        <div class="ln l2">&nbsp;</div>
        <div class="ln l3"><span class="acc">⏺ send_image</span>(<span class="yel">roc_curve.png</span>)</div>
        <div class="ln l4">&nbsp;&nbsp;⎿&nbsp; <span class="muted">公開URL化 (Tailscale Funnel)</span></div>
        <div class="ln l5">&nbsp;&nbsp;⎿&nbsp; LINE push 受理 … <span class="ok">0.1s ✓</span><span class="caret"></span></div>
      </div>
    </div>

    <div class="phone">
      <div class="ph-head">
        <span class="ava">🤖</span>
        <span>sLINE bot<small>Claude Code の生成物が届く</small></span>
      </div>
      <div class="chat">
        <div class="row">
          <span class="ava-s">🤖</span>
          <div class="bubble">
            <svg class="graph" width="190" height="150" viewBox="0 0 190 150">
              <rect width="190" height="150" fill="#fbfcfe"/>
              <!-- 軸 -->
              <line x1="34" y1="118" x2="172" y2="118" stroke="#c7ccd6" stroke-width="1"/>
              <line x1="34" y1="118" x2="34" y2="14" stroke="#c7ccd6" stroke-width="1"/>
              <!-- 対角(ランダム) -->
              <line x1="34" y1="118" x2="172" y2="14" stroke="#cdd3df" stroke-width="1" stroke-dasharray="3 3"/>
              <!-- ROC 塗り -->
              <path d="M34,118 C50,52 96,24 172,14 L172,118 Z" fill="#7aa2f7" fill-opacity="0.16"/>
              <!-- ROC 曲線 -->
              <path d="M34,118 C50,52 96,24 172,14" fill="none" stroke="#3b6fe0" stroke-width="2.4" stroke-linecap="round"/>
              <text x="40" y="26" font-family="sans-serif" font-size="11" fill="#3b6fe0" font-weight="700">AUC = 0.94</text>
              <text x="92" y="138" font-family="sans-serif" font-size="9" fill="#9aa0ac">False Positive Rate</text>
            </svg>
            <div class="cap">AUC = 0.94 出ました 📈</div>
          </div>
          <span class="time">21:43</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
