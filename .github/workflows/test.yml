name: smoke-test

# macOS / Windows / Linux でクロスプラットフォームの自己テストを回す。
# 実送信(LINE)は認証が要るので CI では行わない。import・画像処理・月間クォータ(OS別ロック)・
# 静的サーバーの Range 配信・GIF→mp4 変換 までを検証する（Mac環境でも Windows 動作を確認できる）。

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install ffmpeg (for video conversion tests)
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run smoke test
        run: uv run python smoke_test.py
